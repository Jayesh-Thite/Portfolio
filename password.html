<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protected — Case Study</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #F7F4EE;
      --ink: #1A1814;
      --ink-muted: #5C5852;
      --ink-faint: #A09C95;
      --accent: #C4421A;
      --accent-light: #F5E8E3;
      --border: #E0DBD3;
      --white: #FFFFFF;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .gate {
      width: 100%;
      max-width: 420px;
    }

    .lock-icon {
      width: 48px;
      height: 48px;
      background: var(--accent-light);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }

    .lock-icon svg {
      width: 22px;
      height: 22px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .gate-tag {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 12px;
    }

    .gate h1 {
      font-family: 'Lora', serif;
      font-size: clamp(22px, 5vw, 30px);
      font-weight: 600;
      color: var(--ink);
      line-height: 1.25;
      margin-bottom: 10px;
    }

    .gate-sub {
      font-size: 15px;
      color: var(--ink-muted);
      line-height: 1.65;
      margin-bottom: 36px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 12px;
    }

    .input-wrap input {
      width: 100%;
      padding: 14px 48px 14px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--ink);
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
      letter-spacing: 0.04em;
    }

    .input-wrap input:focus {
      border-color: var(--ink-muted);
    }

    .input-wrap input.error {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .toggle-visibility {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--ink-faint);
      display: flex;
      align-items: center;
    }

    .toggle-visibility svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .error-msg {
      font-size: 13px;
      color: var(--accent);
      margin-bottom: 16px;
      min-height: 18px;
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.2s, transform 0.2s;
    }

    .error-msg.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .error-msg svg {
      width: 14px;
      height: 14px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--white);
      background: var(--ink);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    .submit-btn:hover {
      background: #2e2b26;
    }

    .submit-btn:active {
      transform: scale(0.99);
    }

    .submit-btn.shake {
      animation: shake 0.35s ease;
    }

    @keyframes shake {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-6px); }
      40%  { transform: translateX(6px); }
      60%  { transform: translateX(-4px); }
      80%  { transform: translateX(4px); }
      100% { transform: translateX(0); }
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 32px 0;
    }

    .footer-note {
      font-size: 13px;
      color: var(--ink-faint);
      line-height: 1.6;
    }

    .footer-note a {
      color: var(--ink-muted);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
  </style>
</head>
<body>

  <div class="gate">

    <div class="lock-icon">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
    </div>

    <p class="gate-tag">Protected Case Study</p>
    <h1>This work is password protected</h1>
    <p class="gate-sub">Enter the password to view the full case study. Reach out if you need access.</p>

    <div class="input-wrap">
      <input
        type="password"
        id="passwordInput"
        placeholder="Enter password"
        autocomplete="current-password"
        spellcheck="false"
      />
      <button class="toggle-visibility" id="toggleBtn" aria-label="Show password" type="button">
        <!-- Eye icon -->
        <svg id="eyeIcon" viewBox="0 0 24 24">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
        <!-- Eye-off icon (hidden by default) -->
        <svg id="eyeOffIcon" viewBox="0 0 24 24" style="display:none;">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
          <line x1="1" y1="1" x2="23" y2="23"></line>
        </svg>
      </button>
    </div>

    <div class="error-msg" id="errorMsg">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      Wrong password, try again.
    </div>

    <button class="submit-btn" id="submitBtn" type="button">View Case Study</button>

    <div class="divider"></div>

    <p class="footer-note">Don't have the password? <a href="mailto:">Get in touch</a> to request access.</p>

  </div>

  <script>
    const CORRECT_PASSWORD = 'folio#12354';

    const input     = document.getElementById('passwordInput');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg  = document.getElementById('errorMsg');
    const toggleBtn = document.getElementById('toggleBtn');
    const eyeIcon   = document.getElementById('eyeIcon');
    const eyeOffIcon = document.getElementById('eyeOffIcon');

    // Submit on button click
    submitBtn.addEventListener('click', checkPassword);

    // Submit on Enter key
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') checkPassword();
    });

    // Clear error state on typing
    input.addEventListener('input', function () {
      input.classList.remove('error');
      errorMsg.classList.remove('visible');
    });

    // Toggle password visibility
    toggleBtn.addEventListener('click', function () {
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      eyeIcon.style.display    = isPassword ? 'none'  : 'block';
      eyeOffIcon.style.display = isPassword ? 'block' : 'none';
      toggleBtn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
    });

    function checkPassword() {
      const val = input.value;

      if (val === CORRECT_PASSWORD) {
        submitBtn.textContent = 'Unlocking…';
        submitBtn.style.background = '#3a7d44';
        setTimeout(function () {
          window.location.href = 'index.html';
        }, 500);
      } else {
        // Show error
        input.classList.add('error');
        errorMsg.classList.add('visible');

        // Shake the button
        submitBtn.classList.remove('shake');
        void submitBtn.offsetWidth; // reflow to restart animation
        submitBtn.classList.add('shake');
      }
    }
  </script>

</body>
</html>
