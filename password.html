<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protected — Case Study</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0E0E0E;
      --surface: #161616;
      --border:  #2A2A2A;
      --border2: #333333;
      --ink:     #F0EEE9;
      --ink-2:   #A8A49E;
      --ink-3:   #5C5955;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .gate {
      width: 100%;
      max-width: 400px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .lock-icon {
      width: 44px;
      height: 44px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
    }

    .lock-icon svg {
      width: 18px;
      height: 18px;
      stroke: var(--ink-3);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .gate-tag {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-3);
      font-weight: 600;
      margin-bottom: 14px;
    }

    .gate h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(24px, 4vw, 32px);
      font-weight: 700;
      color: var(--ink);
      line-height: 1.2;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .gate-sub {
      font-size: 15px;
      color: var(--ink-2);
      line-height: 1.7;
      margin-bottom: 40px;
      font-weight: 300;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 10px;
    }

    .input-wrap input {
      width: 100%;
      padding: 14px 48px 14px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: var(--ink);
      background: var(--surface);
      border: 1px solid var(--border);
      outline: none;
      transition: border-color 0.25s;
      letter-spacing: 0.04em;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }

    .input-wrap input::placeholder { color: var(--ink-3); }

    .input-wrap input:focus { border-color: var(--border2); }

    .input-wrap input.error {
      border-color: #6B3A2A;
      background: #1A1210;
    }

    .toggle-visibility {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--ink-3);
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }
    .toggle-visibility:hover { color: var(--ink-2); }

    .toggle-visibility svg {
      width: 17px;
      height: 17px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .error-msg {
      font-size: 13px;
      color: #C87C5A;
      margin-bottom: 16px;
      min-height: 18px;
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.25s, transform 0.25s;
      font-weight: 400;
    }

    .error-msg.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .error-msg svg {
      width: 13px;
      height: 13px;
      stroke: #C87C5A;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--bg);
      background: var(--ink);
      border: none;
      cursor: pointer;
      transition: background 0.25s, transform 0.1s;
      letter-spacing: 0.02em;
      -webkit-font-smoothing: antialiased;
    }

    .submit-btn:hover { background: #D8D5CF; }
    .submit-btn:active { transform: scale(0.99); }

    .submit-btn.shake {
      animation: shake 0.35s ease;
    }

    @keyframes shake {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-6px); }
      40%  { transform: translateX(6px); }
      60%  { transform: translateX(-4px); }
      80%  { transform: translateX(4px); }
      100% { transform: translateX(0); }
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 36px 0;
    }

    .footer-note {
      font-size: 13px;
      color: var(--ink-3);
      line-height: 1.65;
      font-weight: 300;
    }

    .footer-note a {
      color: var(--ink-2);
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color 0.2s;
    }
    .footer-note a:hover { color: var(--ink); }
  </style>
</head>
<body>

  <div class="gate">

    <div class="lock-icon">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
    </div>

    <p class="gate-tag">Protected Case Study</p>
    <h1>This work is password protected</h1>
    <p class="gate-sub">Enter the password to view the full case study. Reach out if you need access.</p>

    <div class="input-wrap">
      <input
        type="password"
        id="passwordInput"
        placeholder="Enter password"
        autocomplete="current-password"
        spellcheck="false"
      />
      <button class="toggle-visibility" id="toggleBtn" aria-label="Show password" type="button">
        <svg id="eyeIcon" viewBox="0 0 24 24">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
        <svg id="eyeOffIcon" viewBox="0 0 24 24" style="display:none;">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
          <line x1="1" y1="1" x2="23" y2="23"></line>
        </svg>
      </button>
    </div>

    <div class="error-msg" id="errorMsg">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      Wrong password, try again.
    </div>

    <button class="submit-btn" id="submitBtn" type="button">View Case Study</button>

    <div class="divider"></div>

    <p class="footer-note">Don't have the password? <a href="mailto:">Get in touch</a> to request access.</p>

  </div>

  <script>
    const CORRECT_PASSWORD = 'folio#12354';

    const input      = document.getElementById('passwordInput');
    const submitBtn  = document.getElementById('submitBtn');
    const errorMsg   = document.getElementById('errorMsg');
    const toggleBtn  = document.getElementById('toggleBtn');
    const eyeIcon    = document.getElementById('eyeIcon');
    const eyeOffIcon = document.getElementById('eyeOffIcon');

    submitBtn.addEventListener('click', checkPassword);

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPassword();
    });

    input.addEventListener('input', () => {
      input.classList.remove('error');
      errorMsg.classList.remove('visible');
    });

    toggleBtn.addEventListener('click', () => {
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      eyeIcon.style.display    = isPassword ? 'none'  : 'block';
      eyeOffIcon.style.display = isPassword ? 'block' : 'none';
      toggleBtn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
    });

    function checkPassword() {
      if (input.value === CORRECT_PASSWORD) {
        submitBtn.textContent = 'Unlocking…';
        submitBtn.style.background = '#2A3D2E';
        submitBtn.style.color = '#7EC88A';
        sessionStorage.setItem('auth', 'granted');
        setTimeout(() => { window.location.href = 'index.html'; }, 600);
      } else {
        input.classList.add('error');
        errorMsg.classList.add('visible');
        submitBtn.classList.remove('shake');
        void submitBtn.offsetWidth;
        submitBtn.classList.add('shake');
      }
    }
  </script>

</body>
</html>
